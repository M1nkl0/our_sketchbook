<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Lil Sketchbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400..700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- floating hand-drawn hearts, MS Paint style -->
  <div class="hearts-layer" id="heartsLayer" aria-hidden="true"></div>

  <header class="topbar">
    <h1 class="logo">Our Lil Sketchbook</h1>
    <p class="tagline">Baby, let's draw all our dreams kikiki</p>
  </header>

  <main class="board">

    <!-- Photo frame: left -->
    <div class="polaroid polaroid-left">
      <div class="photo-placeholder" id="photoLeft">
        <img src="baby_coffee.jpg" alt="">
      </div>
      <p class="caption">:3</p>
    </div>

    <!-- The shared canvas -->
    <section class="canvas-wrap">
      <div class="canvas-tape tape-left"></div>
      <div class="canvas-tape tape-right"></div>

      <div class="toolbar">
        <div class="colors" id="colorSwatches"></div>
        <input type="color" id="colorPicker" value="#E84A9C" title="Custom color">
        <label class="slider-label">
          lil brush
          <input type="range" id="brushSize" min="2" max="40" value="6">
        </label>
        <label class="slider-label">
          lil transparency
          <input type="range" id="opacitySlider" min="10" max="100" value="100">
        </label>
        <button id="eraserBtn" class="tool-btn" title="Eraser">lil eraser</button>
        <button id="clearBtn" class="tool-btn danger" title="Clear the whole board">start again kiki</button>
        <span class="status" id="statusDot">lil connecting…</span>
      </div>

      <canvas id="board" width="1000" height="700"></canvas>
    </section>

    <!-- Photo frame: right -->
    <div class="polaroid polaroid-right">
      <div class="photo-placeholder" id="photoRight">
        <img src="silly_babies.jpg" alt="">
      </div>
      <p class="caption">:3</p>
    </div>

  </main>

  <footer class="footer">
    <p>Happy Birthday, my dear love! I wanna spend a 100 more birthdays together</p>
  </footer>

  <!-- Fullscreen photo lightbox -->
  <div class="lightbox" id="lightbox">
    <img id="lightboxImg" src="" alt="">
  </div>

  <!-- Firebase -->
  <script type="module" src="firebase-init.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
